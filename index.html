---
layout: default
title: damagethundercat.github.io
---

<h1>{{ site.title }}</h1>

{% if site.posts.size > 0 %}
  <ul class="post-list">
    {% for post in site.posts %}
      <li>
        <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time>
        <a href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p>아직 글이 없습니다.</p>
{% endif %}
